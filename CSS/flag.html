<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <style>
        .flag{
            width: 300px;
            height: 300px;
            border:2px solid black;
        }
        .saffron{
            background-color: orange;
            height: 100px;
        }
        .white{
            background-color: white;
            height: 100px;
            display :flex;
            justify-content: center;
            align-items: center;

        }
        .green{
            background-color: green;
            height: 100px;
        }
        .ashoka{
            width: 100px;
            height: 100px;
            border: 2px solid black;
            border-radius: 50%;
            background-color:darkblue;
        }
    </style>
</head>
<body>
    <div class="flag">
        <div class="saffron"></div>
        <div class="white">
            <div class="ashoka"></div>
        </div>
        <div class="green"></div>
    </div>

</body>
</html>
