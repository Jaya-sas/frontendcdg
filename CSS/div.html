<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .venkatesh{
            border: 2px solid black;
            
        }
        .sai{
            height:200px ;
            width:200px;
            background-color: bisque;
        }
    </style>
</head>
<body>
    <!-- boxes laga untayi we use div  -->
    <div class="venkatesh">
        <p>hello</p>
        <h1>heyyyyy</h1>             
    </div>
    <div class="sai">

    </div>

    <!-- we can use section instead of div bcz it uses for screenreaders and seo -->

    <section class="venkatesh">
        <p>hello</p>
        <h1>heyyyyy</h1>  
        <h1>section example</h1>           
    </section>

    <!-- span-used for using specfic part -->

    <p>Lorem ipsum dolor sit <span style="background-color:yellow;">amet consectetur adipisicing elit.</span> Sed, quasi? Recusandae eaque fugiat perspiciatis!</p>
</body>
</html>
