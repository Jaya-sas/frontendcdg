<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
       /*hover-mouse ni button paina move chestham clr will change */
        button:hover{
            background-color: blue;
            color:red;
        }
/*active-aa button click chesthe clr will change*/
        button:active{
            background-color: green;
            color:yellow;
        }
        /*link- if links are not visted displayed in red clr , if visited green/clr ki change avuthayiiii*/
        a:link{
            color:red
        }
        a:visited{
            color:cadetblue;
        }
    </style>
</head>
<body>
    <button>submit</button>
    <a href="https://www.amazon.in">amazon</a>
    <a href="https://www.flipkart.in">flipkart</a>
</body>
</html>
