<!DOCTYPE html>
<html>
    <head>
         <title>1st html class</title>
    </head>
    <body>
        <p> HEY</p>
        <b> hi</b><br>

        <i>hi</i>
        <!-- em-italic and stressed,screenreaders -->
        <em>
            heyyyyyyyyy
        </em>
        <hr>
        <p> h<sub>2</sub>o</p>   
        <p>2<sup>3</sup></p>
        <marquee direction="up">heyyyyyyyyy</marquee>
        <marquee direction="left">feyyyyyyyyy</marquee>
        <button>submit</button>
        <pre>        
                        <!-- pre is used for pattern in names -->
            <h1>
                jaya  
                     sri
                          sai
            </h1>
        </pre>

        <centre>
            <!-- to display name in centre -->
            saiii
        </centre>

        <p>
            <del> 
                <!-- to strike of this 1000 we use de -->
                1000
            </del>99
        </p>
        <!-- mark is used to highlight the text -->

        <p> hellooo <mark> saiiiiii</mark>,how do you do</p>

        <b>hi everyone</b><br>
        <strong>hi eveyone</strong>
        <!-- stromg-thick+important ,screenreaders,SEO-->

        <p> you<em> must</em> complete</p>
    </body>
</html>
