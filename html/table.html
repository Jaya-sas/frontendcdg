<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- border-used for displaying table, cellpadding-for spaceious ness, style="border-collapse: collapse-is used to remve double linees in table  -->
    <table border="4px" cellpadding="20px" style="border-collapse: collapse;">
        <tr>
            <th>Name</td>        <!-- <th>-i used for tableheading in bold    -->
            <th colspan="2">details</th>                  <!-- colspan is used for combining 2 cols into 1 col -->
            <!-- <td>Marks</td> -->
 
        </tr>
        <thead>
            <tbody>
                <tr>
            <th>Name</td>        
            <th colspan="2">details</th>                 
            <!-- <td>Marks</td> -->
 
        </tr>

        <tr>
            <!-- rowspan- is used for combing 2 rows into 1 -->
            <td rowspan="2">Student</td>
            <td>20</td>
            <td>33</td>

        </tr>
        </tbody>
        <tfoot>
                 <th>total</th>
                 <td>11</td>
                 <td>33</td>

            </tfoot>
        </thead>
        

    </table>
</body>
</html>
